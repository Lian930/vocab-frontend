        import * as tsFsrs from 'https://cdn.jsdelivr.net/npm/ts-fsrs@latest/+esm';
        // 直接把 FSRS 類別綁定給引擎
        window.FSRS_Engine = tsFsrs.FSRS;
        console.log("✅ FSRS 演算法引擎終於掛載成功啦！");

</head>
    <style>
    :root {
        /* 🎨 深燕麥極簡風 (Darker Oatmeal / Warm Stone) */
        
        /* 背景：加深的暖灰石色，更有份量感，完全不刺眼 */
        --bg-color: #d1cec7;           
        
        /* 卡片：帶有灰度的米色，不再是亮白，像再生紙板 */
        --card-bg: #e3e1dd;            
        
        /* 輸入框：比卡片稍深，形成自然凹槽 */
        --input-bg: #d6d3ce;           
        
        /* 文字系統：深炭黑，保持清晰閱讀 */
        --text-main: #292524;          
        --text-sub: #57534e;           
        
        /* 邊框：使用深一點的岩石色 */
        --border-color: #bab8b3;       
        
        /* 品牌色：維持深炭黑，穩重 */
        --primary: #1c1917;            
        --primary-hover: #000000;
        
        /* 功能色：稍微調深一點點，適應深色背景 */
        --success: #15803d;            
        --danger: #b91c1c;             
        --warning: #b45309;            
        --practice: #7e22ce;           
        
        /* ☁️ 陰影：因為背景變深，陰影需要加重一點才會有立體感 */
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.08);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: var(--bg-color); 
        color: var(--text-main);
        max-width: 900px; margin: 0 auto; padding: 40px 20px; line-height: 1.7;
        -webkit-font-smoothing: antialiased; 
    }

    /* --- 按鈕設計 --- */
    .btn {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 10px 22px; border-radius: 8px; font-weight: 600; font-size: 14px;
        cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; gap: 8px;
        box-shadow: var(--shadow-sm); letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(0.98); }
    
    .btn-primary { background: var(--primary); color: #e3e1dd; } 
    .btn-primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
    
    .btn-success { background: var(--success); color: #f0fdf4; }
    
    /* 次要按鈕 */
    .btn-secondary { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: #d6d3ce; border-color: #78716c; }
    
    .btn-danger { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; }
    .btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
    
    .btn-icon { padding: 0; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;}

    /* --- 排序工具列樣式 --- */
    .sort-toolbar {
        display: flex; justify-content: flex-end; align-items: center; gap: 10px;
        margin-bottom: 20px; padding: 10px;
        background: rgba(0,0,0,0.03); border-radius: 8px;
    }
    
    .sort-select {
        padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color);
        background: var(--card-bg); color: var(--text-main); font-size: 13px; font-weight: 500;
        cursor: pointer; outline: none; box-shadow: var(--shadow-sm);
        min-width: 150px;
    }
    .sort-select:hover { border-color: var(--text-sub); }
    .sort-select:focus { border-color: var(--primary); }


    /* --- 輸入框 --- */
    input, select, textarea { 
        width: 100%; padding: 14px 16px; background: var(--input-bg); 
        border: 1px solid transparent; 
        color: var(--text-main); 
        border-radius: 8px; box-sizing: border-box; font-size: 15px; 
        font-family: inherit; transition: all 0.2s;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.06); /* 內陰影加深 */
    }
    input:focus, select:focus, textarea:focus { 
        outline: none; background: #fafafa; 
        border-color: #78716c; 
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05); 
    }

    /* --- 容器區塊 --- */
    .container { 
        background: var(--card-bg); padding: 40px; border-radius: 16px; 
        box-shadow: var(--shadow-md); margin-bottom: 24px; 
        border: 1px solid rgba(255,255,255,0.2); 
    }

    .section-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 24px; padding-bottom: 16px; 
        border-bottom: 1px solid var(--border-color);
    }
    .section-header h2 { font-weight: 800; letter-spacing: -0.5px; color: var(--primary); }

    .toggle-btn { font-size: 13px; color: var(--text-sub); cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: 0.2s; background: var(--bg-color); font-weight: 600;}
    .toggle-btn:hover { background: #bab8b3; color: black; }

    /* 定義群組 */
    .def-group { 
        background: #dcd9d5; 
        padding: 24px; border-radius: 12px; margin-bottom: 16px; 
        border: 1px solid var(--border-color);
    }

    /* --- 單字卡片 --- */
    .word-card { 
        background: var(--card-bg); 
        border: 1px solid transparent; 
        padding: 0; border-radius: 16px; margin-bottom: 24px; 
        overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        box-shadow: var(--shadow-sm);
    }
    
    .word-card:hover { 
        transform: translateY(-4px); 
        box-shadow: var(--shadow-lg); 
        border-color: rgba(0,0,0,0.15); 
    }
    
    .review-highlight { border: 2px solid #b45309 !important; box-shadow: 0 10px 30px -5px rgba(180, 83, 9, 0.2); }

    .card-header { 
        background: rgba(255,255,255,0.3); 
        padding: 20px 28px; 
        display: flex; align-items: center; gap: 12px; 
        border-bottom: 1px solid var(--border-color);
    }
    .word-title { font-size: 1.8em; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
    .word-ipa { color: var(--text-sub); font-family: 'Arial Unicode MS', sans-serif; font-size: 0.95em; background: var(--bg-color); padding: 4px 10px; border-radius: 6px; font-weight: 500;}
    
    .timer-badge {
        font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 20px;
        background: var(--bg-color); color: var(--text-sub); margin-left: auto; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .timer-due { background: var(--warning); color: white; animation: pulse 2s infinite;}
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

    .card-body { padding: 24px 28px; }

    .def-row { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--border-color); display: grid; grid-template-columns: 50px 1fr; gap: 16px; }
    .def-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    
    .pos-tag { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--text-sub); text-align: right; margin-top: 6px; letter-spacing: 0.5px;}
    .pos-n { color: #0369a1; } .pos-v { color: #be123c; } .pos-adj { color: #047857; } .pos-adv { color: #b45309; } .pos-phr { color: #6d28d9; }
    
    .meaning-text { font-size: 1.2em; color: var(--text-main); font-weight: 600; line-height: 1.4; }
    .sentence-text { margin-top: 8px; font-size: 1em; color: var(--text-sub); font-style: italic; border-left: 3px solid var(--border-color); padding-left: 14px; line-height: 1.6;}

    .level-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: var(--bg-color); }
    .level-bar-fill { height: 100%; transition: width 0.5s ease-out; }

    /* --- Modal 視窗 --- */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(40, 40, 40, 0.5); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
    .modal-content { background: var(--card-bg); width: 90%; max-width: 550px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 1px solid var(--border-color); overflow: hidden; max-height: 90vh; overflow-y: auto;}
    
    .modal-header { padding: 24px; background: rgba(255,255,255,0.3); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;}
    .modal-body { padding: 28px; }
    .modal-footer { padding: 20px 24px; background: rgba(255,255,255,0.3); border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 12px; }

    /* --- 測驗選單 --- */
    .quiz-option-label {
        display: flex; align-items: center; gap: 14px;
        padding: 16px 20px; margin-bottom: 12px;
        border: 1px solid var(--border-color); border-radius: 12px;
        cursor: pointer; transition: all 0.2s; text-align: left;
        background: #f5f5f4; /* 比卡片亮一點 */
        box-shadow: var(--shadow-sm);
    }
    .quiz-option-label:hover { border-color: var(--text-main); background: #ffffff; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .quiz-option-label input[type="checkbox"] { width: 20px; height: 20px; margin: 0; cursor: pointer; accent-color: var(--text-main); }

    #notification-area { background: #fef3c7; border: 1px solid #d97706; color: #92400e; padding: 16px; border-radius: 12px; margin-bottom: 24px; display: none; box-shadow: var(--shadow-sm); }
    
    .big-speaker-btn { background: var(--text-main); color: #e3e1dd; border: none; border-radius: 50%; width: 100px; height: 100px; font-size: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 30px auto; box-shadow: 0 10px 25px rgba(0,0,0, 0.2); transition: transform 0.2s; }
    .big-speaker-btn:active { transform: scale(0.95); }

    /* --- 側邊懸浮工具箱 (Responsive Sidebar) --- */
    /* 預設 (手機/平板)：保持原本的橫向排列 */
    .sort-toolbar {
        display: flex; justify-content: flex-end; align-items: center; gap: 10px;
        margin-bottom: 20px; padding: 10px;
        background: rgba(0,0,0,0.03); border-radius: 8px;
    }

    /* 🖥️ 電腦版：變身為右側懸浮面板 */
    @media (min-width: 1250px) {
        .sort-toolbar {
            position: fixed;
            top: 150px;           /* 距離頂部的高度 */
            left: 50%;            /* 從螢幕正中間開始算 */
            margin-left: 470px;   /* 往右推 470px (主內容 900px/2 = 450 + 20px 間距) */
            
            width: 220px;         /* 側邊欄寬度 */
            flex-direction: column; /* 改為垂直排列 */
            align-items: stretch; 
            
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            padding: 24px;
            border-radius: 16px;
            z-index: 100;         /* 確保浮在最上層 */
            gap: 15px;
        }

        /* 加一個帥氣的標題 */
        .sort-toolbar::before {
            content: "🔧 工具箱";
            font-size: 1.1em;
            font-weight: 800;
            color: var(--primary);
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 5px;
            display: block;
        }

        /* 隱藏原本的 "排序方式：" 文字，因為有標題了 */
        .sort-toolbar label { display: none; }
        
        /* 讓下拉選單和按鈕佔滿寬度 */
        .sort-select, .sort-toolbar .btn {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid transparent;
        }
        .sort-select:hover { background: white; border-color: var(--border-color); }
    }

</style>

            <h2 style="margin:0; border:none; color:var(--text-main);">🗂️ 雲端字庫 (<span id="total-count" style="color:var(--primary);">0</span>)</h2>

            <button onclick="bulkDeleteWords()" class="btn btn-danger" id="bulk-delete-btn" style="display: none; box-shadow: var(--shadow-md);">

            </div>

<script>
    // --- API 基本設定 (雲端版) ---
    const API_BASE_URL = 'https://vocab-backend-api.onrender.com/api/words';
    
    let cards = []; 
    let reviewList = []; 
    let quizQueue = [];
    let currentQ = null;
    let currentMode = ''; 

    // --- 初始化 ---
    window.onload = async function() {
        addDefinitionInput('definitions-container');
        await loadWordsFromAPI(); 
        setInterval(checkReview, 60000); 
    };

    function updateCount() { document.getElementById('total-count').innerText = cards.length; }
    function toggleSection(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'none') ? 'block' : 'none'; }
    function speak(text) { const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; window.speechSynthesis.speak(u); }

    // --- 輔助函式：取得今天的午夜時間戳記 (00:00:00) ---
    function getTodayMidnight() {
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        return now.getTime();
    }
    // --- 雲端資料操作 (CRUD) ---
    // --- 升級版：SWR 雙重載入機制 (LocalStorage + 雲端同步) ---
    // --- 雲端資料操作 (CRUD) ---
    // --- 雲端資料操作 (CRUD) ---
    async function loadWordsFromAPI() {
        const loadingIndicator = document.getElementById('loading-indicator'); 
        if (loadingIndicator) loadingIndicator.style.display = 'block';

        // 🛠️ 抽離出來的「資料修復中心」：不管資料從哪來，都先洗乾淨
        const cleanData = (dataList) => {
            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;
            return dataList.map(c => {
                let safeReview = c.nextReview || now;
                
                // 🛑 強力修正：如果是 Level 0 或 1 (或根本沒等級)，且時間跑到明天以後
                // 強制把它拉回「現在」，直接打破 29D 或 27M 的迴圈
                if ((c.level === undefined || c.level <= 1) && (safeReview - now > oneDay)) {
                    console.warn(`自動修復單字時間異常: ${c.word}`);
                    safeReview = now; 
                }
                
                return { ...c, nextReview: safeReview };
            });
        };

        // 🌟 步驟一：先從瀏覽器 LocalStorage 挖出歷史備份
        const cachedData = localStorage.getItem('vocab_cache_data');
        if (cachedData) {
            try {
                let parsedCache = JSON.parse(cachedData);
                // 快取拿出來的資料也要洗過！避免一開網頁先看到錯誤時間
                cards = cleanData(parsedCache); 
                checkReview(); 
                updateCount(); 
                renderCards(); // 確保一開始載入快取就有套用排序
                console.log("⚡ 瞬間載入本機快取！");
            } catch (e) {
                console.error("快取解析失敗，忽略快取", e);
            }
        }

        // ☁️ 步驟二：背景默默向 Render 雲端伺服器請求最新資料
        try {
            const response = await fetch(API_BASE_URL);
            if (response.ok) {
                const freshCards = await response.json();
                
                // 🛑 把從伺服器抓下來的資料也洗乾淨 🛑
                cards = cleanData(freshCards);
                
                // 將修復後的乾淨資料轉為字串
                const cleanDataString = JSON.stringify(cards);
                
                // 如果洗乾淨的雲端資料跟快取「不一樣」，才重新渲染畫面並更新快取
                if (cleanDataString !== cachedData) {
                    checkReview();
                    updateCount();
                    renderCards(); // 確保排序邏輯被套用
                    localStorage.setItem('vocab_cache_data', cleanDataString);
                    console.log("☁️ 雲端資料同步完成 (含自動修復)！");
                } else {
                    console.log("✅ 資料一致，無需更新。");
                }
            } else {
                console.error("讀取雲端資料失敗，狀態碼：", response.status);
            }
        } catch (error) {
            console.error("無法連線到雲端伺服器，繼續使用離線快取", error);
        } finally {
            if (loadingIndicator) loadingIndicator.style.display = 'none';
        }
    }

            const response = await fetch(`https://vocab-backend-api.onrender.com/api/fetch_word/${wordInput}`);
            
            if (response.ok) {
                const data = await response.json();

                document.getElementById('input-ipa').value = data.ipa || '';

        }
    }

                explanation: expEl ? expEl.value.trim() : "", 
                sentence: group.querySelector('.input-sentence').value.trim()
            });
        });

    function getLevelColor(level) {
        const hue = Math.min(level, 9) * 13; 
        return `hsl(${hue}, 80%, 60%)`; 
    }
    // --- 時間顯示優化：強制以「天」為單位 ---
    // --- 時間顯示修正：強制以「天」為單位 (無條件進位) ---
    function getTimeUntil(timestamp) {
        const diff = timestamp - Date.now();
        
        // 如果時間已過，顯示 Review Now!
        if (diff <= 0) return "Review Now!";

        // 🟢 關鍵修改：
        // 舊的程式碼有算出 minutes 和 hours，這裡我們全部拿掉。
        // 直接算出天數，並用 Math.ceil (無條件進位)。
        // 這樣就算是剩 1 分鐘，也會顯示 "in 1d" (代表在 1 天內到期)，不會顯示 "27M"。
        const days = Math.ceil(diff / (24 * 60 * 60 * 1000));
        
        return `in ${days}d`;
    }

    // --- 渲染卡片 (含排序邏輯) ---
    // --- 渲染卡片 (防彈升級版：避免單一壞資料搞垮整個畫面) ---
    // --- 渲染卡片 (防彈升級版：避免單一壞資料搞垮整個畫面) ---
    function renderCards() {
        const list = document.getElementById('card-list');
        list.innerHTML = '';
        
        // ✨ 1. 抓取目前的分類篩選條件
        const filterSelect = document.getElementById('filter-category');
        const filterCat = filterSelect ? filterSelect.value : 'all';
        
        // ✨ 2. 根據條件過濾單字 (如果舊單字沒分類，預設算 daily)
        let displayCards = cards;
        if (filterCat !== 'all') {
            displayCards = cards.filter(c => (c.category || 'daily') === filterCat);
        }
        
        // ✨ 3. 動態更新畫面上的單字總數
        const countSpan = document.getElementById('total-count');
        if (countSpan) countSpan.innerText = displayCards.length;

        const sortSelect = document.getElementById('sort-mode');
        const sortMode = sortSelect ? sortSelect.value : 'review-asc';
        
        // 🌟 4. 注意：改用剛剛過濾好的 displayCards 來排序
        const sortedCards = [...displayCards].sort((a, b) => {
            switch (sortMode) {
                case 'review-asc': return a.nextReview - b.nextReview;
                case 'review-desc': return b.nextReview - a.nextReview;
                case 'level-asc': 
                    if (a.level !== b.level) return (a.level || 0) - (b.level || 0);
                    return a.nextReview - b.nextReview;
                case 'level-desc': 
                    if (a.level !== b.level) return (b.level || 0) - (a.level || 0);
                    return a.nextReview - b.nextReview;
                case 'alpha-asc': return (a.word || '').localeCompare(b.word || '');
                case 'alpha-desc': return (b.word || '').localeCompare(a.word || '');
                default: return b.id - a.id;
            }
        });

        sortedCards.forEach(card => {
            try {
                const el = document.createElement('div');
                const isDue = Date.now() >= card.nextReview;
                el.className = `word-card ${isDue ? 'review-highlight' : ''}`;
                
                // 防呆：如果卡片沒有等級 (因為升級 FSRS)，預設為 0
                const lvl = card.level || 0;
                const progressPercent = Math.min((lvl / 9) * 100, 100);
                const levelColor = getLevelColor(lvl);
                const timeText = getTimeUntil(card.nextReview);

                let defsHtml = '';
                // 🛡️ 關鍵防護：確保 definitions 存在且是陣列才執行，避免當機
                if (card.definitions && Array.isArray(card.definitions)) {
                    card.definitions.forEach(def => {
                        const safePos = def.pos || 'n.';
                        const posClass = `pos-${safePos.replace('.','')}`;
                        defsHtml += `
                            <div class="def-row">
                                <div class="pos-tag ${posClass}">${safePos}</div>
                                <div class="def-content">
                                    <div class="meaning-text">${def.meaning || ''}</div>
                                    ${def.explanation ? `<div style="font-size:0.95em; color:var(--text-sub); margin-top:6px; line-height:1.5;">${def.explanation}</div>` : ''}
                                    ${def.sentence ? `<div class="sentence-text">${def.sentence}</div>` : ''}
                                </div>
                            </div>
                        `;
                    });
                }

                // 🌟 安全處理音標，避免語法衝突
                const ipaHtml = card.ipa ? '<span class="word-ipa" style="white-space: nowrap; flex-shrink:0;">' + card.ipa + '</span>' : '';

                // ✨ 製作分類小徽章 (判斷是考試還是日常)
                const isExam = ((card.category || 'daily') === 'exam');
                const catText = isExam ? '🏫 考試' : '☕ 日常';
                const catBg = isExam ? '#e0e7ff' : '#fef3c7';
                const catColor = isExam ? '#3730a3' : '#92400e';
                const catBorder = isExam ? '#a5b4fc' : '#fde68a';
                const catBadgeHtml = `<span style="font-size:12px; padding:4px 8px; border-radius:6px; font-weight:600; flex-shrink:0; background:${catBg}; color:${catColor}; border:1px solid ${catBorder}; margin-left:10px;">${catText}</span>`;


                el.innerHTML = `
                    <div class="card-header">
                        <div style="display:flex; align-items:center; gap:15px; flex:1; min-width:0;">
                            <input type="checkbox" class="word-checkbox" value="${card.id}" onchange="toggleBulkDeleteBtn()" style="width: 20px; height: 20px; margin: 0; padding: 0; cursor: pointer; accent-color: var(--danger); flex-shrink: 0; box-shadow: none; background: transparent;">
                            <span class="word-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${card.word}</span>
                            ${ipaHtml}
                        </div>
                        
                        <span class="timer-badge ${isDue ? 'timer-due' : ''}" style="margin-left:auto; flex-shrink:0;">${timeText}</span>
                        
                        <div style="display:flex; align-items:center; gap:10px; margin-left:15px; flex-shrink:0;">
                            <span class="level-badge" style="color:${levelColor}; border-color:${levelColor}">Lv.${lvl}</span>
                            <div style="display:flex; gap:6px;">
                                <button class="btn btn-secondary btn-icon" onclick="speak('${card.word}')">🔊</button>
                                <button class="btn btn-primary btn-icon" onclick="openEditModal('${card.id}')">✎</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card-body">
                        ${defsHtml}
                    </div>
                    
                    <div class="level-bar-container">
                        <div class="level-bar-fill" style="width:${progressPercent}%; background-color:${levelColor};"></div>
                    </div>
                `;
                
                // 🌟 就是這行救命指令！把做好的單字卡貼到畫面上
                list.appendChild(el);
                
            } catch (err) {
                console.error("這張單字卡資料有誤，略過渲染:", card, err);
            }
        });
    }

    // --- SRS 演算法 ---
    function checkReview() {
        const now = Date.now();
        reviewList = cards.filter(c => now >= c.nextReview);
        renderCards(); 
        const area = document.getElementById('notification-area');
        if (reviewList.length > 0) {
            area.style.display = 'block';
            area.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span>🔔 <strong>SRS 系統提醒：</strong> 今天有 ${reviewList.length} 個單字到期了！</span>
                    <button class="btn btn-primary" style="background:#f59e0b; color:black;" onclick="startQuiz('review')">開始複習 (計分)</button>
                </div>
            `;
        } else {
            area.style.display = 'none';
        }
    }

    // --- 修正後的 SRS 間隔計算 ---
    function calculateNextInterval(level) {
        const oneDay = 24 * 60 * 60 * 1000;
        
        // 🛑 關鍵修正：如果是 Level 0 或 Level 1，一律設為 1 天後複習
        // 這樣就不會發生 Level 0 跑到 default (30天) 的問題
        if (level <= 1) {
            return 1 * oneDay;
        }

        switch(level) {
            case 2: return 2 * oneDay;  
            case 3: return 7 * oneDay;  
            case 4: return 15 * oneDay; 
            default: return 30 * oneDay; 
        }
    }

    // --- 🏆 測驗系統 2.0 (設定、計時、進度、篩選、降級懲罰) ---
    
    let quizTimerInterval = null;
    let quizStartTime = 0;
    let quizTotalCount = 0;
    let selectedTypes = [0, 1, 2, 3, 4]; // 預設全選

    // --- 測驗系統 ---
    function startQuiz(mode) {
        currentMode = mode;
        const badgeEl = document.getElementById('quiz-mode-badge');
        const statusEl = document.getElementById('quiz-status');
        const bodyEl = document.getElementById('quiz-body');
        const footerEl = document.getElementById('quiz-footer');

        document.getElementById('quiz-feedback').innerHTML = '';
        document.getElementById('quiz-title').innerText = "測驗設定";

        // 準備題目列隊
        if (mode === 'review') {
            quizQueue = cards.filter(c => Date.now() >= c.nextReview);
            if (quizQueue.length === 0) { alert('太棒了！目前沒有需要複習的單字。'); return; }
            badgeEl.innerText = '🔥 SRS 計分';
            badgeEl.style.background = 'var(--warning)'; badgeEl.style.color = 'white';
        } else {

        }

        quizTotalCount = quizQueue.length;

        bodyEl.innerHTML = `
            <div style="text-align:left; padding:0 10px;">

                </p>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <label class="quiz-option-label" style="width:100%; max-width:320px;">
                        <input type="checkbox" name="qType" value="0" checked> 
                        <span>英翻中 (單字 -> 中文)</span>
                    </label>
                    <label class="quiz-option-label" style="width:100%; max-width:320px;">
                        <input type="checkbox" name="qType" value="1" checked> 
                        <span>中翻英 (中文 -> 拼字)</span>
                    </label>
                    <label class="quiz-option-label" style="width:100%; max-width:320px;">
                        <input type="checkbox" name="qType" value="2" checked>

                        <input type="checkbox" name="qType" value="3" checked>

                    </label>
                    <label class="quiz-option-label" style="width:100%; max-width:320px;">

    // 2. 真正開始 (按下「開始測驗」後)
    function beginSession() {
        // 取得使用者勾選的題型
        const checkboxes = document.querySelectorAll('input[name="qType"]:checked');
        selectedTypes = Array.from(checkboxes).map(cb => parseInt(cb.value));
        
        if (selectedTypes.length === 0) { alert("請至少勾選一種題型！"); return; }

        document.getElementById('quiz-title').innerText = currentMode === 'review' ? "複習中..." : "練習中...";
        document.getElementById('quiz-status').style.display = 'block'; // 顯示計時器與進度
        
        // 啟動計時器
        quizStartTime = Date.now();
        if (quizTimerInterval) clearInterval(quizTimerInterval);
        
        quizTimerInterval = setInterval(() => {
            const diff = Math.floor((Date.now() - quizStartTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('quiz-timer').innerText = `${m}:${s}`;
        }, 1000);

        // 恢復 footer
        document.getElementById('quiz-footer').innerHTML = '<button onclick="closeQuiz()" class="btn btn-secondary" style="width:100%;">中斷測驗</button>';

        nextQuestion();
    }

    function nextQuestion() {
        document.getElementById('quiz-feedback').innerHTML = '';
        
        // 更新進度顯示 (例如: 4/10)
        // 因為 pop() 會讓 length 變小，所以用 (總數 - 剩餘數 + 1)
        const currentIdx = quizTotalCount - quizQueue.length + 1;
        document.getElementById('quiz-counter').innerText = `${Math.min(currentIdx, quizTotalCount)} / ${quizTotalCount}`;

        if (quizQueue.length === 0) {
            finishQuiz();
            return;
        }

        const card = quizQueue.pop(); // 取出一張卡片
        const def = card.definitions[Math.floor(Math.random() * card.definitions.length)];
        
        // 從使用者勾選的題型中隨機選一個
        const type = selectedTypes[Math.floor(Math.random() * selectedTypes.length)];
        currentQ = { card, def, type }; 
        
        let html = '';
        // --- 產生題目 HTML (根據題型) ---
        if (type === 0) { // 英翻中
            setTimeout(() => speak(card.word), 300);
            html = `<h2 style="margin-bottom:10px;">${card.word}</h2>
                    <p style="color:var(--text-sub)">(${def.pos}) 請輸入中文意思</p>
                    <input type="text" id="ans-input" autocomplete="off" placeholder="中文字詞">`;
        } else if (type === 1) { // 中翻英
            html = `<h2 style="margin-bottom:10px;">${def.meaning}</h2>
                    <p style="color:var(--text-sub)">(${def.pos}) 請拼出單字</p>
                    <input type="text" id="ans-input" autocomplete="off" placeholder="英文拼字">`;
        } else if (type === 2) { // 填空
            const masked = def.sentence ? def.sentence.replace(new RegExp(card.word, 'gi'), '_____') : null;
            if (masked) {
                html = `<div style="background:var(--input-bg); padding:15px; border-radius:8px; font-style:italic; margin-bottom:15px; text-align:left;">${masked}</div>
                        <p style="color:var(--text-sub)">(${def.pos}) ${def.meaning}</p>
                        <input type="text" id="ans-input" autocomplete="off" placeholder="填入缺少的單字">`;
            } else {
                // 如果沒有例句，自動降級為 Type 0
                currentQ.type = 0; 
                setTimeout(() => speak(card.word), 300);
                html = `<h2 style="margin-bottom:10px;">${card.word}</h2><p style="color:var(--text-sub)">(${def.pos}) 請輸入中文意思 (無例句)</p><input type="text" id="ans-input" autocomplete="off">`;
            }
        } else if (type === 3) { // 聽寫
            setTimeout(() => speak(card.word), 500);
            html = `<button class="big-speaker-btn" onclick="speak('${card.word}')">🔊</button>
                    <p style="color:var(--text-sub)">請聽發音並拼出單字</p>
                    <input type="text" id="ans-input" autocomplete="off" placeholder="聽寫英文">`;
        } else if (type === 4) { // 詞性
            setTimeout(() => speak(card.word), 300);
            html = `<h2 style="margin-bottom:5px;">${card.word}</h2>
                    <div style="font-size:1.2em; color:var(--warning); margin-bottom:15px;">「${def.meaning}」</div>
                    <p style="color:var(--text-sub)">當作這個意思時，它是什麼詞性？</p>
                    <div style="display:flex; justify-content:center; gap:5px; margin-bottom:10px; font-size:12px; color:#64748b;">( n. / v. / adj. / adv. / prep. )</div>
                    <input type="text" id="ans-input" autocomplete="off" placeholder="輸入縮寫">`;
        }

        html += `<button onclick="checkAns()" class="btn btn-primary" style="width:100%; margin-top:15px;">送出答案</button>`;
        document.getElementById('quiz-body').innerHTML = html;
        setTimeout(() => {
            const input = document.getElementById('ans-input');
            if(input) { input.focus(); input.onkeydown = (e) => { if(e.key==='Enter') checkAns(); }; }
        }, 100);
    }

    // --- 修正後的答題檢查邏輯 ---
        async function checkAns() {
        const inputEl = document.getElementById('ans-input');
        if (!inputEl) return;
        const input = inputEl.value.trim().toLowerCase();
        
        if (input === "") {
            alert("請輸入答案！不能留白喔。");
            inputEl.focus();
            return;
        }

        const card = currentQ.card;
        const def = currentQ.def;
        const type = currentQ.type;
        
        let isCorrect = false;
        let correctAnswerMsg = '';

        // 💡 升級：多重詞義與切割比對 (解決死板改錯的問題)
        if (type === 0) { 
            // 將「蘋果, 蘋果樹 / 某種東西」切開，變成陣列 ['蘋果', '蘋果樹', '某種東西']
            const possibleAnswers = def.meaning.split(/[,、/|]/).map(s => s.trim().toLowerCase());
            
            // 只要你的輸入包含在任一答案內，或是答案包含在你的輸入內，就算對！
            isCorrect = possibleAnswers.some(ans => ans.includes(input) || input.includes(ans));
            correctAnswerMsg = def.meaning;
        } else if (type === 1 || type === 2 || type === 3) { 
            isCorrect = (input === card.word.toLowerCase());
            correctAnswerMsg = card.word;
        } else if (type === 4) { 
            const standardInput = input.replace('.', '');
            const standardAns = def.pos.replace('.', '').toLowerCase();
            isCorrect = (standardInput === standardAns);
            correctAnswerMsg = def.pos;
        }

        // 隱藏原本的送出按鈕與輸入框
        const submitBtn = document.querySelector('button[onclick="checkAns()"]');
        if (submitBtn) submitBtn.style.display = 'none';
        inputEl.disabled = true;

        // 呼叫對應的選項面板
        if (isCorrect) {
            showCorrectOptions();
        } else {
            showWrongOptions(correctAnswerMsg);
        }
    }

    // 🟩 答對時的 FSRS 選項面板
    function showCorrectOptions() {
        const fb = document.getElementById('quiz-feedback');
        if (currentMode === 'review') {
            fb.innerHTML = `
                <div style="color:var(--success); font-weight:bold; margin-bottom:10px; font-size:1.1em;">✅ 正確！你覺得這題多難？</div>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button class="btn" onclick="gradeCard('Hard')" style="flex:1; background:#f59e0b; color:#fff;">困難 (Hard)</button>
                    <button class="btn btn-success" onclick="gradeCard('Good')" style="flex:1;">良好 (Good)</button>
                    <button class="btn btn-primary" onclick="gradeCard('Easy')" style="flex:1;">簡單 (Easy)</button>
                </div>
            `;
        } else {
            fb.innerHTML = '<span style="color:var(--success); font-weight:bold; font-size:1.1em;">✅ Correct!</span>';
            setTimeout(nextQuestion, 1000); 
        }
    }

    // 🟥 答錯時的選項面板 (+算我對)
    function showWrongOptions(correctMsg) {
        const fb = document.getElementById('quiz-feedback');
        const type = currentQ.type;
        const card = currentQ.card;
        
        if (type !== 0 && type !== 4) speak(card.word); 

        if (currentMode === 'review') {
            fb.innerHTML = `
                <div style="color:var(--danger); margin-bottom:10px; font-size:1.1em;">❌ 答案是：<span style="font-weight:bold">${correctMsg}</span></div>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button class="btn btn-danger" onclick="gradeCard('Again')" style="flex:1;">記錯了 (Again)</button>
                    <button class="btn" onclick="overrideCorrect()" style="flex:1; background:var(--input-bg); color:var(--text-main); border:1px solid var(--border-color);">😎 算我對</button>
                </div>
            `;
        } else {
            fb.innerHTML = `<span style="color:var(--danger); font-size:1.1em;">❌ 答案是：<span style="font-weight:bold">${correctMsg}</span></span>`;
            setTimeout(nextQuestion, 2000);
        }
    }

    // 😎 算我對 (Override) 按鈕觸發
    function overrideCorrect() {
        showCorrectOptions();
    }

    // 🧠 FSRS 演算法計分與資料回傳
    // 🧠 FSRS 演算法計分與資料回傳 (防呆升級版)
    // 🧠 FSRS 演算法計分與資料回傳 (最終穩定版)
    // 🧠 FSRS 演算法計分與資料回傳 (終極無敵動態載入版)
    // 🧠 FSRS 演算法計分與資料回傳 (Brave 瀏覽器相容版)
    // 🧠 FSRS 演算法計分與資料回傳 (終極 ESM 穩定版)
    // 🧠 FSRS 演算法計分與資料回傳 (官方範例修正版)
    // 🧠 FSRS 演算法計分與資料回傳 (無敵版)
    function gradeCard(ratingStr) {
        const btns = document.querySelectorAll('#quiz-feedback button');
        btns.forEach(b => b.disabled = true);
        
        try {
            // 🌟 如果找不到引擎，通常是被瀏覽器快取陰了
            if (!window.FSRS_Engine) {
                alert("⚠️ 快取作祟！請在網址列後面加上 ?v=1 重新整理網頁！");
                btns.forEach(b => b.disabled = false);
                return;
            }

            const card = currentQ.card;
            const f = new window.FSRS_Engine(); // 直接啟動引擎
            
            let fCard = {
                due: new Date(card.nextReview || Date.now()),
                stability: card.stability || 0,
                difficulty: card.difficulty || 0,
                elapsed_days: card.elapsed_days || 0,
                scheduled_days: card.scheduled_days || 0,
                reps: card.reps || 0,
                lapses: card.lapses || 0,
                state: card.state || 0
            };

            const ratingDict = { 'Again': 1, 'Hard': 2, 'Good': 3, 'Easy': 4 };
            const rating = ratingDict[ratingStr];

            const schedulingCards = f.repeat(fCard, new Date());
            const newFSRSData = schedulingCards[rating].card;

            card.nextReview = newFSRSData.due.getTime();
            card.stability = newFSRSData.stability;
            card.difficulty = newFSRSData.difficulty;
            card.elapsed_days = newFSRSData.elapsed_days;
            card.scheduled_days = newFSRSData.scheduled_days;
            card.reps = newFSRSData.reps;
            card.lapses = newFSRSData.lapses;
            card.state = newFSRSData.state;

            updateCardInBackend(card);

            if (ratingStr === 'Again') {
                quizQueue.unshift(card);
            }
            
            nextQuestion();

        } catch (error) {
            console.error("FSRS 計算錯誤:", error);
            alert("計分發生錯誤！錯誤訊息：" + error.message);
            btns.forEach(b => b.disabled = false); 
        }
    }
    function finishQuiz() {
        if (quizTimerInterval) clearInterval(quizTimerInterval);
        const duration = document.getElementById('quiz-timer').innerText;
        
        document.getElementById('quiz-body').innerHTML = `
            <h2 style="color:var(--success)">🎉 測驗完成！</h2>
            <p style="font-size:1.2em;">耗時：${duration}</p>
            <p style="color:var(--text-sub)">${currentMode === 'review' ? '系統已更新記憶曲線。' : '手感不錯！繼續保持。'}</p>
        `;
        document.getElementById('quiz-footer').innerHTML = '<button onclick="closeQuiz()" class="btn btn-primary" style="width:100%;">結束</button>';
    }

    // 獨立出來的更新函式
    async function updateCardInBackend(card) {
        try {
            await fetch(`${API_BASE_URL}/${card.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(card)
            });
        } catch(e) { console.error("SRS 更新失敗", e); }
    }

    function closeQuiz() { 
        if (quizTimerInterval) clearInterval(quizTimerInterval);
        document.getElementById('quiz-modal').style.display = 'none'; 
        if (currentMode === 'review') {
            loadWordsFromAPI(); // 結束後刷新主畫面
        }
    }

    // --- 一鍵清空表單 ---
    function clearAddForm() {
        document.getElementById('input-word').value = ''; 
        document.getElementById('input-ipa').value = '';
        document.getElementById('definitions-container').innerHTML = ''; 
        addDefinitionInput('definitions-container'); 
    }

        // 當勾選框狀態改變時，計算有幾個被勾選，並決定要不要顯示刪除按鈕
    function toggleBulkDeleteBtn() {
        const checkedBoxes = document.querySelectorAll('.word-checkbox:checked');
        const btn = document.getElementById('bulk-delete-btn');
        
        if (checkedBoxes.length > 0) {
            btn.style.display = 'inline-block';
            btn.innerText = `🗑️ 刪除選取的單字 (${checkedBoxes.length})`;
        } else {
            btn.style.display = 'none';
        }
    }

    // 執行批次刪除
    async function bulkDeleteWords() {
        // 1. 抓出所有被勾選的 checkbox，並把把它們的 value (單字 ID) 蒐集進陣列
        const checkboxes = document.querySelectorAll('.word-checkbox:checked');
        const idsToDelete = Array.from(checkboxes).map(cb => cb.value);

        if (idsToDelete.length === 0) return;
        
        // 2. 防呆警告
        if (!confirm(`確定要將這 ${idsToDelete.length} 個單字永久刪除嗎？這無法復原喔！`)) {
            return; 
        }

        try {
            // 3. 把 ID 陣列送給我們剛剛寫的 FastAPI 後端
            // 注意：這裡的 API 網址要對應你原本的設計，如果是接 /api/words/bulk-delete
            const response = await fetch(`${API_BASE_URL}/bulk-delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: idsToDelete })
            });
            
            const data = await response.json();
            alert(data.message);
            
            // 4. 刪除成功後，重新整理列表並隱藏按鈕
            loadWordsFromAPI(); 
            toggleBulkDeleteBtn();
            
        } catch (error) {
            console.error("批次刪除失敗:", error);
            alert("刪除失敗，請檢查網路連線或 Console 紀錄！");
        }
    }
    
</script>
